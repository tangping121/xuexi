<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>🧩 七巧板</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{
  font-family:-apple-system,'PingFang SC',sans-serif;
  background:linear-gradient(160deg,#FDF2F8,#FFE4EC,#FDF2F8);
  min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;user-select:none;
}
.header{
  padding:12px 16px 4px;display:flex;align-items:center;justify-content:space-between;
}
.header h1{font-size:20px;font-weight:700;color:#BE185D}
.header-right{display:flex;gap:6px;align-items:center}
.header-right button{
  background:none;border:none;font-size:18px;cursor:pointer;padding:4px;transition:transform .2s;
}
.header-right button:active{transform:scale(.82)}
.header-right span{font-size:14px;color:#BE185D;font-weight:500}

/* Template selector */
.tpl-bar{display:flex;gap:6px;padding:4px 14px;overflow-x:auto;scrollbar-width:none}
.tpl-bar::-webkit-scrollbar{display:none}
.tpl-btn{
  padding:4px 12px;border-radius:99px;border:2px solid #F9A8D4;
  font-size:12px;cursor:pointer;white-space:nowrap;background:#fff;color:#BE185D;transition:all .15s;flex-shrink:0;
  display:flex;align-items:center;gap:4px;
}
.tpl-btn:active{transform:scale(.9)}
.tpl-btn.active{background:linear-gradient(135deg,#EC4899,#BE185D);color:#fff;border-color:#BE185D}

/* Canvas area */
.canvas-wrap{flex:1;margin:6px 12px 4px;border-radius:20px;overflow:hidden;background:#fff;box-shadow:0 4px 16px rgba(190,24,93,.06);position:relative}
canvas{width:100%;height:100%;display:block;touch-action:none}

/* Piece tray */
.tray{
  display:flex;gap:6px;padding:6px 14px 12px;overflow-x:auto;scrollbar-width:none;justify-content:center;
}
.piece{
  width:52px;height:52px;border-radius:12px;cursor:grab;display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:600;color:#fff;transition:transform .15s,opacity .3s;flex-shrink:0;
  border:2px solid rgba(255,255,255,.3);
}
.piece:active{transform:scale(.85)}
.piece.used{opacity:.3;pointer-events:none;transform:scale(.85)}
.piece.p1{background:#EC4899}.piece.p2{background:#F97316}.piece.p3{background:#FBBF24}
.piece.p4{background:#34D399}.piece.p5{background:#22C55E}.piece.p6{background:#3B82F6}.piece.p7{background:#8B5CF6}
.piece .emoji{font-size:22px}

.toast{
  position:fixed;top:60px;left:50%;transform:translateX(-50%);background:#1A1A2E;color:#fff;
  padding:8px 20px;border-radius:99px;font-size:13px;z-index:200;
  opacity:0;transition:opacity .4s;pointer-events:none;
}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="header">
  <h1>🧩 七巧板</h1>
  <div class="header-right">
    <span id="doneDisplay">0/7</span>
    <button id="clearBtn">🗑️</button>
  </div>
</div>
<div class="tpl-bar" id="tplBar"></div>
<div class="canvas-wrap">
  <canvas id="canvas"></canvas>
</div>
<div class="tray" id="tray"></div>
<div class="toast" id="toast"></div>
<script>
const TEMPLATES = [
  {name:'🏠 房子',w:'80,140 160,60 240,140 80,140 160,60 240,140 160,220'},
  {name:'🐱 小猫',w:'60,100 100,60 160,80 140,140 200,120 240,160 140,200'},
  {name:'🐟 小鱼',w:'60,120 100,80 160,60 200,100 240,120 180,160 120,160'},
  {name:'⛵ 小船',w:'80,160 160,60 240,160 80,160 160,60 200,200 120,200'},
  {name:'🌟 星星',w:'130,50 160,90 210,90 170,130 180,180 130,150 80,180'},
  {name:'🦋 蝴蝶',w:'60,100 100,60 160,80 160,140 200,100 240,140 160,200'},
  {name:'🌷 花朵',w:'130,60 160,100 200,80 180,140 220,140 160,200 100,140'},
  {name:'🦆 鸭子',w:'60,140 100,80 160,60 200,100 180,160 140,200 80,180'},
];
const PIECES = [
  {id:0,emoji:'🔺',label:'大三角'},{id:1,emoji:'🔺',label:'大三角'},
  {id:2,emoji:'🔺',label:'中三角'},{id:3,emoji:'🔺',label:'小三角'},
  {id:4,emoji:'🔺',label:'小三角'},{id:5,emoji:'🔲',label:'正方形'},
  {id:6,emoji:'▱',label:'菱形'},
];

let currentTpl=0;
let placed=0;

const canvas=document.getElementById('canvas');
const ctx=canvas.getContext('2d');
let dragging=false;
let dragIdx=-1;
let pieces=[];

function resizeCanvas(){
  const wrap=canvas.parentElement;
  canvas.width=wrap.clientWidth*window.devicePixelRatio;
  canvas.height=wrap.clientHeight*window.devicePixelRatio;
  ctx.scale(window.devicePixelRatio,window.devicePixelRatio);
  canvas.style.width=wrap.clientWidth+'px';
  canvas.style.height=wrap.clientHeight+'px';
  draw();
}
window.addEventListener('resize',resizeCanvas);

function loadTpl(idx){
  currentTpl=idx;
  placed=0;
  pieces=TEMPLATES[idx].w.split(' ').map((p,i)=>{
    const [x,y]=p.split(',');
    return {
      x:parseInt(x),y:parseInt(y),
      w:40,h:40,
      placed:false,
      color:['#EC4899','#F97316','#FBBF24','#34D399','#22C55E','#3B82F6','#8B5CF6'][i%7],
    };
  });
  // Update tray
  document.querySelectorAll('.tpl-btn').forEach((b,i)=>b.classList.toggle('active',i===idx));
  draw();renderTray();
}

function draw(){
  const w=canvas.width/window.devicePixelRatio;
  const h=canvas.height/window.devicePixelRatio;
  ctx.clearRect(0,0,w,h);
  // Draw template outline
  ctx.strokeStyle='#E5E7EB';ctx.lineWidth=2;ctx.setLineDash([6,4]);
  pieces.forEach(p=>{
    ctx.strokeRect(p.x,p.y,p.w,p.h);
  });
  ctx.setLineDash([]);
  // Draw placed pieces
  pieces.forEach(p=>{
    if(!p.placed)return;
    ctx.fillStyle=p.color;
    ctx.shadowColor='rgba(0,0,0,.08)';ctx.shadowBlur=8;
    ctx.beginPath();ctx.roundRect(p.x,p.y,p.w,p.h,8);ctx.fill();
    ctx.shadowColor='transparent';ctx.shadowBlur=0;
  });
  document.getElementById('doneDisplay').textContent=placed+'/7';
  if(placed===7)showToast('🎉 恭喜你拼好了！');
}

// Polyfill roundRect
if(!CanvasRenderingContext2D.prototype.roundRect){
  CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){
    if(r>w/2)r=w/2;if(r>h/2)r=h/2;
    this.moveTo(x+r,y);this.lineTo(x+w-r,y);
    this.quadraticCurveTo(x+w,y,x+w,y+r);
    this.lineTo(x+w,y+h-r);
    this.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
    this.lineTo(x+r,y+h);
    this.quadraticCurveTo(x,y+h,x,y+h-r);
    this.lineTo(x,y+r);
    this.quadraticCurveTo(x,y,x+r,y);
    this.closePath();
  };
}

function renderTray(){
  const tray=document.getElementById('tray');
  tray.innerHTML=PIECES.map((p,i)=>`
    <div class="piece p${p.id+1}${pieces[i]?.placed?' used':''}" data-idx="${i}">
      <span class="emoji">${p.emoji}</span>
    </div>
  `).join('');
  tray.querySelectorAll('.piece:not(.used)').forEach(el=>{
    el.addEventListener('click',()=>{
      const idx=parseInt(el.dataset.idx);
      if(pieces[idx].placed)return;
      pieces[idx].placed=true;
      placed++;
      draw();renderTray();
      // Play a simple tone
      try{var c=new(window.AudioContext||window.webkitAudioContext)(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type='sine';o.frequency.setValueAtTime(660+placed*40,c.currentTime);g.gain.setValueAtTime(.15,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.2);o.start();o.stop(c.currentTime+.2)}catch(e){}
    });
  });
}

// ── Template bar ──
function buildTplBar(){
  const bar=document.getElementById('tplBar');
  TEMPLATES.forEach((t,i)=>{
    const btn=document.createElement('button');
    btn.className='tpl-btn'+(i===0?' active':'');
    btn.innerHTML=t.name;
    btn.onclick=()=>loadTpl(i);
    bar.appendChild(btn);
  });
}

document.getElementById('clearBtn').addEventListener('click',()=>{
  if(placed===0&&pieces.every(p=>!p.placed)){showToast('还没有放置任何拼块呢');return}
  pieces.forEach(p=>p.placed=false);placed=0;draw();renderTray();showToast('🗑️ 已清空');
});

let toastTimer;
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),1500)}

// Init
buildTplBar();
setTimeout(()=>{resizeCanvas();loadTpl(0)},100);
</script>
</body>
</html>
