<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>🎨 我的小花园</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{
  font-family:-apple-system,'PingFang SC',sans-serif;
  background:linear-gradient(160deg,#E0F7E0,#C8E6C9,#A5D6A7);
  min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;user-select:none;
}
.header{
  padding:14px 16px 4px;display:flex;align-items:center;justify-content:space-between;
}
.header h1{font-size:20px;font-weight:700;color:#1B5E20}
.header-right{display:flex;gap:8px;align-items:center}
.header-right span{font-size:14px;font-weight:600;color:#388E3C}
.header-right button{
  background:none;border:none;font-size:18px;cursor:pointer;padding:4px;transition:transform .2s;
}
.header-right button:active{transform:scale(.82)}

/* Garden */
.garden-area{
  flex:1;display:flex;flex-direction:column;align-items:center;padding:6px 12px 4px;
}
.garden-grid{
  display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;width:100%;max-width:360px;flex:1;
}
.plot{
  background:#D7CCC8;border-radius:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;
  cursor:pointer;transition:all .3s;position:relative;min-height:100px;
  box-shadow:inset 0 4px 8px rgba(0,0,0,.05);
}
.plot:active{transform:scale(.95)}
.plot .emoji{font-size:48px;transition:transform .5s}
.plot .label{font-size:10px;color:#6D4C41;margin-top:2px}
.plot.seed{background:#BCAAA4}
.plot.seed .emoji{font-size:28px;animation:seedWiggle 2s ease infinite}
@keyframes seedWiggle{0%,100%{transform:rotate(0)}25%{transform:rotate(-5deg)}75%{transform:rotate(5deg)}}
.plot.growing{background:#C8E6C9}
.plot.growing .emoji{font-size:36px;animation:growPop 1.5s ease infinite}
@keyframes growPop{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
.plot.bloom{background:#FFE4EC}
.plot.bloom .emoji{font-size:52px;animation:bloomFloat 2s ease infinite}
@keyframes bloomFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.plot.wilt{background:#EF9A9A}
.plot.wilt .emoji{font-size:40px;filter:grayscale(.5)}

/* Toolbar */
.toolbar{
  display:flex;gap:6px;padding:6px 14px;flex-wrap:wrap;justify-content:center;
}
.tool-btn{
  padding:6px 14px;border-radius:99px;border:2px solid #81C784;
  font-size:12px;font-weight:600;cursor:pointer;background:#fff;color:#2E7D32;
  transition:all .15s;display:flex;align-items:center;gap:4px;
}
.tool-btn:active{transform:scale(.9)}
.tool-btn.active{background:linear-gradient(135deg,#66BB6A,#2E7D32);color:#fff;border-color:#2E7D32}
.tool-btn.water{background:#E3F2FD;border-color:#90CAF9;color:#1565C0}
.tool-btn.water.active{background:linear-gradient(135deg,#42A5F5,#1565C0);color:#fff;border-color:#1565C0}

/* Stats */
.stats{display:flex;gap:16px;padding:4px 14px;font-size:12px;color:#388E3C;font-weight:500;justify-content:center}

.toast{
  position:fixed;top:60px;left:50%;transform:translateX(-50%);background:#1A1A2E;color:#fff;
  padding:8px 20px;border-radius:99px;font-size:13px;z-index:200;
  opacity:0;transition:opacity .4s;pointer-events:none;
}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="header">
  <h1>🎨 我的小花园</h1>
  <div class="header-right">
    <span id="coinDisplay">💰 50</span>
    <button id="resetBtn" title="重新开始">🔄</button>
  </div>
</div>

<div class="stats">
  <span>🌱 已种 <b id="plantedCount">0</b></span>
  <span>🌷 开花 <b id="bloomCount">0</b></span>
</div>

<div class="garden-area">
  <div class="garden-grid" id="gardenGrid"></div>
</div>

<div class="toolbar">
  <button class="tool-btn active" id="plantBtn">🌱 种花</button>
  <button class="tool-btn water" id="waterBtn">💧 浇水</button>
  <button class="tool-btn" id="harvestBtn">🧺 收获</button>
  <button class="tool-btn" id="shopBtn">🏪 花店</button>
</div>

<div class="toast" id="toast"></div>
<script>
const FLOWERS = [
  {seed:'🌰',growing:'🌱',bloom:'🌷',name:'郁金香',cost:10},
  {seed:'🌰',growing:'🌱',bloom:'🌻',name:'向日葵',cost:15},
  {seed:'🌰',growing:'🌱',bloom:'🌹',name:'玫瑰',cost:20},
  {seed:'🌰',growing:'🌱',bloom:'🌸',name:'樱花',cost:12},
  {seed:'🌰',growing:'🌱',bloom:'🌺',name:'木槿',cost:18},
  {seed:'🌰',growing:'🌱',bloom:'🌼',name:'小雏菊',cost:8},
  {seed:'🌰',growing:'🌱',bloom:'🌿',name:'幸运草',cost:5},
];

let plots=[];
let coins=50;
let tool='plant';
let totalPlanted=0,totalBloom=0;

function initGarden(){
  plots=Array(9).fill(null).map(()=>({state:'empty',flower:null,water:0,growTime:0}));
  renderGarden();
}
function renderGarden(){
  const grid=document.getElementById('gardenGrid');
  grid.innerHTML=plots.map((p,i)=>{
    let cls='plot',emoji='',label='';
    if(p.state==='empty'){cls+='';emoji='➕';label='种花'}
    else if(p.state==='seed'){cls+=' seed';emoji=p.flower.seed;label='🌱 发芽中'}
    else if(p.state==='growing'){cls+=' growing';emoji=p.flower.growing;label='🌿 长大了'}
    else if(p.state==='bloom'){cls+=' bloom';emoji=p.flower.bloom;label='🌷 盛开！'}
    else if(p.state==='wilt'){cls+=' wilt';emoji='🍂';label='凋谢了'}
    return `<div class="${cls}" data-idx="${i}"><div class="emoji">${emoji}</div><div class="label">${label}</div></div>`;
  }).join('');

  grid.querySelectorAll('.plot').forEach(el=>{
    el.addEventListener('click',()=>handlePlot(parseInt(el.dataset.idx)));
  });
  document.getElementById('plantedCount').textContent=totalPlanted;
  document.getElementById('bloomCount').textContent=totalBloom;
}

function handlePlot(idx){
  const p=plots[idx];
  if(tool==='plant'){
    if(p.state!=='empty'){showToast('这里已经有东西了');return}
    if(coins<5){showToast('💰 金币不够，去花店买种子吧');return}
    const f=FLOWERS[Math.floor(Math.random()*FLOWERS.length)];
    p.state='seed';p.flower=f;p.water=0;p.growTime=Date.now();
    coins-=5;updateCoins();totalPlanted++;
    showToast('🌰 种下了'+f.name+'的种子！');
    // Sound
    try{var c=new(window.AudioContext||window.webkitAudioContext)(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type='sine';o.frequency.setValueAtTime(440,c.currentTime);g.gain.setValueAtTime(.1,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.15);o.start();o.stop(c.currentTime+.15)}catch(e){}
  }else if(tool==='water'){
    if(p.state==='empty'||p.state==='wilt'){showToast('这里没有植物');return}
    if(p.state==='bloom'){showToast('🌷 已经开花了，不用浇水啦！');return}
    p.water++;
    if(p.water>=3){
      if(p.state==='seed'){p.state='growing';showToast('🌱 发芽了！继续浇水让它开花')}
      else if(p.state==='growing'){p.state='bloom';totalBloom++;showToast('🌷 开花了！好漂亮！🎉');try{var c=new(window.AudioContext||window.webkitAudioContext)(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type='sine';o.frequency.setValueAtTime(660,c.currentTime);g.gain.setValueAtTime(.15,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.15);o.start();o.stop(c.currentTime+.15);setTimeout(function(){var o2=c.createOscillator(),g2=c.createGain();o2.connect(g2);g2.connect(c.destination);o2.type='sine';o2.frequency.setValueAtTime(880,c.currentTime);g2.gain.setValueAtTime(.15,c.currentTime);g2.gain.exponentialRampToValueAtTime(.001,c.currentTime+.15);o2.start();o2.stop(c.currentTime+.15)},100)}catch(e){}}
    }else{showToast('💧 浇水了！('+p.water+'/3)')}
  }else if(tool==='harvest'){
    if(p.state==='bloom'){
      coins+=p.flower.cost;
      p.state='empty';p.flower=null;p.water=0;
      updateCoins();showToast('🧺 收获了'+p.flower?.name+'！+'+p.flower?.cost+'💰');
    }else if(p.state==='wilt'){
      p.state='empty';p.flower=null;p.water=0;showToast('🧺 清理了凋谢的花')
    }else{showToast('还没有可以收获的')}
  }
  renderGarden();
}

function updateCoins(){document.getElementById('coinDisplay').textContent='💰 '+coins}

// ── Tool buttons ──
document.getElementById('plantBtn').addEventListener('click',()=>{tool='plant';updateToolbar();showToast('🌱 点击空地种花')});
document.getElementById('waterBtn').addEventListener('click',()=>{tool='water';updateToolbar();showToast('💧 点击植物浇水')});
document.getElementById('harvestBtn').addEventListener('click',()=>{tool='harvest';updateToolbar();showToast('🧺 点击盛开的花朵收获')});

function updateToolbar(){
  document.querySelectorAll('.tool-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById(tool+'Btn').classList.add('active');
}

// ── Shop ──
document.getElementById('shopBtn').addEventListener('click',()=>{
  let msg='🏪 花店\n\n种子价格：5💰/个\n\n收获可卖：\n';
  FLOWERS.forEach(f=>{msg+=f.bloom+' '+f.name+' → '+f.cost+'💰\n'});
  msg+='\n💰 当前金币：'+coins;
  alert(msg);
});

document.getElementById('resetBtn').addEventListener('click',()=>{
  if(confirm('确定要重新开始吗？所有花园都会清空。')){coins=50;totalPlanted=0;totalBloom=0;initGarden();updateCoins();showToast('🔄 新花园！')}
});

let toastTimer;
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),1500)}

initGarden();
</script>
</body>
</html>
