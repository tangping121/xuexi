<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>🔎 找不同</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{
  font-family:-apple-system,'PingFang SC',sans-serif;
  background:linear-gradient(160deg,#EEF2FF,#E0E7FF,#C7D2FE);
  min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;user-select:none;
}
.header{
  padding:14px 16px 4px;display:flex;align-items:center;justify-content:space-between;
}
.header h1{font-size:20px;font-weight:700;color:#4338CA}
.header-right{display:flex;gap:10px;align-items:center}
.header-right span{font-size:14px;font-weight:600;color:#4338CA}
.header-right button{
  background:none;border:none;font-size:18px;cursor:pointer;padding:4px;transition:transform .2s;
}
.header-right button:active{transform:scale(.82)}

/* Level info */
.level-bar{
  display:flex;align-items:center;justify-content:center;gap:10px;padding:2px 0 4px;
}
.level-text{font-size:13px;color:#4338CA;font-weight:500}

/* Game area */
.game-area{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:4px 10px 2px;width:100%;
}
.panel-row{
  display:flex;gap:6px;width:100%;max-width:420px;justify-content:center;
}
.panel{
  flex:1;background:#fff;border-radius:16px;padding:8px;aspect-ratio:1;
  box-shadow:0 4px 12px rgba(67,56,202,.06);border:2px solid #DDD6FE;
  position:relative;overflow:hidden;max-width:200px;
}
.panel .label{
  position:absolute;top:4px;left:50%;transform:translateX(-50%);
  font-size:10px;color:#4338CA;background:#EEF2FF;padding:1px 8px;border-radius:99px;z-index:2;
}
.panel-grid{
  display:grid;grid-template-columns:repeat(4,1fr);gap:2px;width:100%;height:100%;padding-top:16px;
}
.grid-item{
  border-radius:6px;display:flex;align-items:center;justify-content:center;
  font-size:22px;cursor:pointer;transition:all .15s;position:relative;
}
.grid-item:active{transform:scale(.85)}
.grid-item.found{border:2px solid #34D399;border-radius:8px;pointer-events:none}
.grid-item.found::after{content:'✓';position:absolute;top:-2px;right:-2px;font-size:10px;color:#34D399;font-weight:700}
.grid-item.wrong{animation:shake .3s ease}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
.grid-item.hint{animation:hintPop .5s ease;border:2px solid #FBBF24;border-radius:8px}
@keyframes hintPop{0%,100%{transform:scale(1)}30%{transform:scale(1.15)}}

/* Complete overlay */
.complete{
  display:none;position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.3);backdrop-filter:blur(4px);
  flex-direction:column;align-items:center;justify-content:center;
}
.complete.show{display:flex}
.complete-box{
  background:#fff;border-radius:28px;padding:32px 40px;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.15);
}
.complete-box .trophy{font-size:72px}
.complete-box .title{font-size:22px;font-weight:700;color:#1A1A2E;margin:8px 0}
.complete-box button{
  margin-top:10px;padding:12px 32px;border:none;border-radius:99px;font-size:16px;font-weight:600;cursor:pointer;
  background:linear-gradient(135deg,#6366F1,#4338CA);color:#fff;transition:transform .15s;
}
.complete-box button:active{transform:scale(.92)}

.toast{
  position:fixed;top:60px;left:50%;transform:translateX(-50%);background:#1A1A2E;color:#fff;
  padding:8px 20px;border-radius:99px;font-size:13px;z-index:200;
  opacity:0;transition:opacity .4s;pointer-events:none;
}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="header">
  <h1>🔎 找不同</h1>
  <div class="header-right">
    <span id="scoreDisplay">⭐ 0</span>
    <button id="hintBtn" title="提示">💡</button>
  </div>
</div>
<div class="level-bar">
  <button id="prevLevelBtn" style="background:none;border:none;font-size:16px;cursor:pointer;color:#4338CA">◀</button>
  <span class="level-text" id="levelText">第 1 关</span>
  <button id="nextLevelBtn" style="background:none;border:none;font-size:16px;cursor:pointer;color:#4338CA">▶</button>
</div>

<div class="game-area">
  <div class="panel-row">
    <div class="panel" id="panelA">
      <div class="label">图 A</div>
      <div class="panel-grid" id="gridA"></div>
    </div>
    <div class="panel" id="panelB">
      <div class="label">图 B</div>
      <div class="panel-grid" id="gridB"></div>
    </div>
  </div>
</div>

<div class="complete" id="completeOverlay">
  <div class="complete-box">
    <div class="trophy">🏆</div>
    <div class="title" id="completeTitle">全部找到！</div>
    <button id="nextLevelCompleteBtn">下一关 ➜</button>
  </div>
</div>

<div class="toast" id="toast"></div>
<script>
const LEVELS = [
  {
    grid:[
      ['🐱','🐶','🐰','🐼'],
      ['🐸','🐵','🦊','🐻'],
      ['🐨','🐯','🦁','🐮'],
      ['🐷','🐭','🐹','🐙'],
    ],
    diffs:[{r:0,c:0,to:'🐱→🐱'},{r:1,c:2,to:'🦊→🐺'},{r:3,c:1,to:'🐭→🐹'}],
    diffPositions:[{r:0,c:0,v:'😺'},{r:1,c:2,v:'🐺'},{r:3,c:1,v:'🐹'}],
  },
  {
    grid:[
      ['🍎','🍐','🍊','🍋'],
      ['🍌','🍉','🍇','🍓'],
      ['🍒','🍑','🥭','🍍'],
      ['🥝','🍅','🍆','🥑'],
    ],
    diffs:[{r:0,c:2,to:'🍊→🍋'},{r:2,c:0,to:'🍒→🍑'},{r:3,c:3,to:'🥑→🧅'}],
    diffPositions:[{r:0,c:2,v:'🍋'},{r:2,c:0,v:'🍑'},{r:3,c:3,v:'🧅'}],
  },
  {
    grid:[
      ['🌸','🌻','🌹','🌺'],
      ['🌷','🌼','🌿','🌵'],
      ['🌴','🍀','🌾','🎋'],
      ['🌳','🌲','🍁','🌰'],
    ],
    diffs:[{r:1,c:1,to:'🌼→🌻'},{r:2,c:2,to:'🎋→🌴'},{r:3,c:0,to:'🌳→🌲'}],
    diffPositions:[{r:1,c:1,v:'🌻'},{r:2,c:2,v:'🌴'},{r:3,c:0,v:'🌲'}],
  },
  {
    grid:[
      ['⭐','🌙','☀️','⚡'],
      ['🌈','❄️','☁️','🌊'],
      ['🔥','💧','🌪️','⛄'],
      ['🎈','🎀','🎁','🎂'],
    ],
    diffs:[{r:0,c:0,to:'⭐→🌟'},{r:2,c:3,to:'⛄→❄️'},{r:3,c:2,to:'🎁→🎀'}],
    diffPositions:[{r:0,c:0,v:'🌟'},{r:2,c:3,v:'❄️'},{r:3,c:2,v:'🎀'}],
  },
  {
    grid:[
      ['🧸','⚽','🎮','📚'],
      ['🖍️','🎨','🎵','🎹'],
      ['🌈','🦋','🐝','🐞'],
      ['🍭','🍩','🍪','🧁'],
    ],
    diffs:[{r:0,c:3,to:'📚→📖'},{r:2,c:0,to:'🌈→🌈'},{r:3,c:2,to:'🍪→🥨'}],
    diffPositions:[{r:0,c:3,v:'📖'},{r:2,c:0,v:'🌈'},{r:3,c:2,v:'🥨'}],
  },
];

let currentLevel=0;
let found=new Set();
let score=0;
let hintCount=3;

function loadLevel(idx){
  currentLevel=idx;
  found=new Set();
  const l=LEVELS[idx];
  document.getElementById('levelText').textContent='第 '+(idx+1)+' / '+LEVELS.length+' 关';

  // Grid A (original)
  const gridA=document.getElementById('gridA');
  gridA.innerHTML=l.grid.map((row,ri)=>row.map((cell,ci)=>`<div class="grid-item" data-r="${ri}" data-c="${ci}">${cell}</div>`).join('')).join('');

  // Grid B (with differences)
  const gridB=document.getElementById('gridB');
  let bGrid=l.grid.map(row=>[...row]);
  l.diffPositions.forEach(d=>{bGrid[d.r][d.c]=d.v});
  gridB.innerHTML=bGrid.map((row,ri)=>row.map((cell,ci)=>`<div class="grid-item" data-r="${ri}" data-c="${ci}">${cell}</div>`).join('')).join('');

  // Click on B to find differences
  gridB.querySelectorAll('.grid-item').forEach(el=>{
    el.addEventListener('click',()=>{
      const r=parseInt(el.dataset.r),c=parseInt(el.dataset.c);
      if(found.has(r+','+c))return;
      const isDiff=l.diffPositions.some(d=>d.r===r&&d.c===c);
      if(isDiff){
        found.add(r+','+c);
        el.classList.add('found');
        // Also mark on A
        const aEl=gridA.querySelector(`.grid-item[data-r="${r}"][data-c="${c}"]`);
        if(aEl)aEl.classList.add('found');
        score++;document.getElementById('scoreDisplay').textContent='⭐ '+score;
        showToast('🎉 找到了！');
        // Sound
        try{var c2=new(window.AudioContext||window.webkitAudioContext)(),o=c2.createOscillator(),g=c2.createGain();o.connect(g);g.connect(c2.destination);o.type='sine';o.frequency.setValueAtTime(660,c2.currentTime);g.gain.setValueAtTime(.15,c2.currentTime);g.gain.exponentialRampToValueAtTime(.001,c2.currentTime+.15);o.start();o.stop(c2.currentTime+.15);setTimeout(function(){var o2=c2.createOscillator(),g2=c2.createGain();o2.connect(g2);g2.connect(c2.destination);o2.type='sine';o2.frequency.setValueAtTime(880,c2.currentTime);g2.gain.setValueAtTime(.15,c2.currentTime);g2.gain.exponentialRampToValueAtTime(.001,c2.currentTime+.15);o2.start();o2.stop(c2.currentTime+.15)},80)}catch(e){}
        if(found.size===l.diffPositions.length){
          document.getElementById('completeOverlay').classList.add('show');
          document.getElementById('completeTitle').textContent='🎉 全部找到了！';
        }
      }else{
        el.classList.add('wrong');
        setTimeout(()=>el.classList.remove('wrong'),300);
        showToast('❌ 这里没有不同哦');
      }
    });
  });
}

document.getElementById('prevLevelBtn').addEventListener('click',()=>{
  if(currentLevel>0){loadLevel(currentLevel-1)}else showToast('已经是第一关了');
});
document.getElementById('nextLevelBtn').addEventListener('click',()=>{
  if(currentLevel<LEVELS.length-1){loadLevel(currentLevel+1)}else showToast('🎉 恭喜通关全部关卡！');
});
document.getElementById('nextLevelCompleteBtn').addEventListener('click',()=>{
  document.getElementById('completeOverlay').classList.remove('show');
  if(currentLevel<LEVELS.length-1)loadLevel(currentLevel+1);
  else showToast('🎉 全部通关啦！');
});
document.getElementById('hintBtn').addEventListener('click',()=>{
  if(hintCount<=0){showToast('💡 提示用完了');return}
  const l=LEVELS[currentLevel];
  const unfound=l.diffPositions.filter(d=>!found.has(d.r+','+d.c));
  if(!unfound.length){showToast('已经全部找到了！');return}
  const h=unfound[0];
  const el=document.getElementById('gridB').querySelector(`.grid-item[data-r="${h.r}"][data-c="${h.c}"]`);
  if(el){el.classList.add('hint');setTimeout(()=>el.classList.remove('hint'),800)}
  hintCount--;showToast('💡 提示剩余: '+hintCount);
});

let toastTimer;
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),1500)}

loadLevel(0);
</script>
</body>
</html>
