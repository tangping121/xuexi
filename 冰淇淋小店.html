<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>🍦 冰淇淋小店</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{
  font-family:-apple-system,'PingFang SC',sans-serif;
  background:linear-gradient(160deg,#FFF7ED 0%,#FEF3C7 40%,#FDE68A 100%);
  min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;user-select:none;
}
.header{
  padding:12px 16px 4px;display:flex;align-items:center;justify-content:space-between;
}
.header h1{font-size:20px;font-weight:700;color:#92400E}
.header-right{display:flex;gap:6px}
.header-right button{
  background:none;border:none;font-size:18px;cursor:pointer;padding:4px;transition:transform .2s;
}
.header-right button:active{transform:scale(.82)}

/* Customer */
.customer-area{
  text-align:center;padding:6px 14px 2px;min-height:70px;
}
.customer{display:inline-flex;flex-direction:column;align-items:center;gap:2px}
.customer .emoji{font-size:48px;animation:customerIn .5s ease}
@keyframes customerIn{0%{transform:scale(0) translateX(-40px)}100%{transform:scale(1) translateX(0)}}
.customer .order{font-size:14px;font-weight:600;color:#92400E;background:#FFFBEB;padding:3px 14px;border-radius:99px}
.customer .speech{font-size:28px;animation:speechPop .3s ease}
@keyframes speechPop{0%{transform:scale(0)}100%{transform:scale(1)}}
.earned{font-size:14px;color:#D97706;margin-top:2px}

/* Ice cream builder */
.builder{
  flex:1;display:flex;flex-direction:column;align-items:center;padding:4px 16px 8px;
}
.ice-cream{
  height:160px;display:flex;flex-direction:column-reverse;align-items:center;
  position:relative;width:100px;margin:4px auto;
}
.scoop{
  width:80px;height:80px;border-radius:50%;transition:all .3s;
  margin-top:-15px;box-shadow:0 3px 6px rgba(0,0,0,.1);
  animation:scoopDrop .3s ease;
}
@keyframes scoopDrop{0%{transform:translateY(-30px);opacity:0}100%{transform:translateY(0);opacity:1}}
.cone{
  width:0;height:0;border-left:45px solid transparent;border-right:45px solid transparent;
  border-top:65px solid #D4A574;margin-top:-2px;
}
.toppings{
  display:flex;gap:2px;flex-wrap:wrap;justify-content:center;margin-top:2px;
  font-size:16px;min-height:22px;
}

/* Flavor buttons */
.flavor-bar{
  display:flex;gap:8px;padding:4px 14px;flex-wrap:wrap;justify-content:center;
}
.flavor-btn{
  width:48px;height:48px;border-radius:50%;border:2.5px solid #DDD6FE;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:700;color:#fff;transition:transform .15s;
}
.flavor-btn:active{transform:scale(.85)}
.flavor-btn.s1{background:#FCA5A5;border-color:#FCA5A5}
.flavor-btn.s2{background:#FCD34D;border-color:#FCD34D}
.flavor-btn.s3{background:#6EE7B7;border-color:#6EE7B7}
.flavor-btn.s4{background:#C4B5FD;border-color:#C4B5FD}
.flavor-btn.s5{background:#FDBA74;border-color:#FDBA74}
.flavor-btn.s6{background:#A78BFA;border-color:#A78BFA}

/* Toppings */
.topping-bar{
  display:flex;gap:6px;padding:4px 14px;flex-wrap:wrap;justify-content:center;
}
.topping-btn{
  font-size:22px;cursor:pointer;padding:4px;border-radius:10px;background:#fff;
  border:2px solid #FDE68A;transition:transform .15s;width:40px;height:40px;display:flex;align-items:center;justify-content:center;
}
.topping-btn:active{transform:scale(.85)}

/* Action */
.serve-area{padding:6px 14px 16px;display:flex;gap:8px;justify-content:center}
.serve-btn{
  padding:10px 28px;border:none;border-radius:99px;font-size:15px;font-weight:600;
  cursor:pointer;transition:transform .15s;
}
.serve-btn:active{transform:scale(.92)}
.serve-btn.done{background:linear-gradient(135deg,#F59E0B,#D97706);color:#fff;box-shadow:0 4px 12px rgba(217,119,6,.2)}
.serve-btn.clear{background:#fff;color:#92400E;border:2px solid #FDE68A}

.toast{
  position:fixed;top:60px;left:50%;transform:translateX(-50%);background:#1A1A2E;color:#fff;
  padding:8px 20px;border-radius:99px;font-size:13px;z-index:200;
  opacity:0;transition:opacity .4s;pointer-events:none;
}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="header">
  <h1>🍦 冰淇淋小店</h1>
  <div class="header-right">
    <span style="font-size:16px;color:#D97706;font-weight:600">💰 <span id="moneyDisplay">0</span></span>
  </div>
</div>

<div class="customer-area" id="customerArea">
  <div class="customer" id="customer">
    <div class="emoji" id="customerEmoji">🐰</div>
    <div class="speech" id="customerSpeech">🤔</div>
    <div class="order" id="customerOrder">我要一个冰淇淋！</div>
  </div>
</div>

<div class="flavor-bar" id="flavorBar"></div>
<div class="topping-bar" id="toppingBar"></div>

<div class="builder">
  <div class="ice-cream" id="iceCream">
    <div class="scoop" style="display:none" id="scoop1"></div>
    <div class="scoop" style="display:none" id="scoop2"></div>
    <div class="scoop" style="display:none" id="scoop3"></div>
    <div class="toppings" id="toppingsArea"></div>
    <div class="cone"></div>
  </div>
  <div class="earned" id="earnedDisplay">🍦 先选口味，再做冰淇淋</div>
</div>

<div class="serve-area">
  <button class="serve-btn done" id="serveBtn">🍦 做给顾客</button>
  <button class="serve-btn clear" id="clearBtn">🗑️ 重做</button>
</div>

<div class="toast" id="toast"></div>
<script>
const CUSTOMERS=[
  {emoji:'🐰',want:'草莓',likes:['草莓'],pay:3},
  {emoji:'🐱',want:'香草',likes:['香草','巧克力'],pay:3},
  {emoji:'🐶',want:'巧克力',likes:['巧克力'],pay:4},
  {emoji:'🐼',want:'抹茶',likes:['抹茶','芒果'],pay:4},
  {emoji:'🐸',want:'双球!',likes:['草莓','香草'],pay:5},
  {emoji:'🦊',want:'芒果',likes:['芒果','草莓'],pay:3},
  {emoji:'🐻',want:'三球!大份',likes:['巧克力','抹茶','香草'],pay:6},
  {emoji:'🐨',want:'蓝莓',likes:['蓝莓','草莓'],pay:4},
];
const FLAVORS=[
  {name:'草莓',color:'#FCA5A5',emoji:'🍓'},
  {name:'香草',color:'#FCD34D',emoji:'🌼'},
  {name:'抹茶',color:'#6EE7B7',emoji:'🍵'},
  {name:'蓝莓',color:'#C4B5FD',emoji:'🫐'},
  {name:'芒果',color:'#FDBA74',emoji:'🥭'},
  {name:'葡萄',color:'#A78BFA',emoji:'🍇'},
];
const TOPPINGS=['🍫','🍬','🥜','🍪','❤️','⭐'];

let scoops=[];
let toppings=[];
let money=0;
let currentCustomer=null;
let orderCount=0;

function nextCustomer(){
  currentCustomer=CUSTOMERS[orderCount%CUSTOMERS.length];
  orderCount++;
  document.getElementById('customerEmoji').textContent=currentCustomer.emoji;
  document.getElementById('customerSpeech').textContent='🧐';
  document.getElementById('customerOrder').textContent='我要 '+currentCustomer.want+'！';
  scoops=[];toppings=[];
  updateIceCream();
  document.getElementById('earnedDisplay').textContent='🍦 快来帮我做！';
}

function addScoop(fIdx){
  if(scoops.length>=3){showToast('最多三个球哦');return}
  scoops.push(fIdx);
  updateIceCream();
  document.getElementById('earnedDisplay').textContent='🍦 再加点 toppings 吧！';
}
function addTopping(t){
  if(toppings.length>=4){showToast('够啦够啦');return}
  toppings.push(t);
  updateIceCream();
}
function updateIceCream(){
  for(let i=1;i<=3;i++){
    const el=document.getElementById('scoop'+i);
    if(i<=scoops.length){
      el.style.display='block';
      el.style.background=FLAVORS[scoops[i-1]].color;
      el.textContent=FLAVORS[scoops[i-1]].emoji;
      el.style.display='flex';el.style.alignItems='center';el.style.justifyContent='center';
    }else{el.style.display='none'}
  }
  document.getElementById('toppingsArea').textContent=toppings.join(' ');
}

function serve(){
  if(!currentCustomer||!scoops.length){
    showToast('先做冰淇淋呀！');return
  }
  const customer=currentCustomer;
  const liked=customer.likes.some(l=>scoops.some(s=>FLAVORS[s].name===l));
  if(liked){
    money+=customer.pay;
    document.getElementById('moneyDisplay').textContent=money;
    document.getElementById('customerSpeech').textContent='😍';
    document.getElementById('customerOrder').textContent='好好吃！给你 '+customer.pay+' 元💰';
    document.getElementById('earnedDisplay').textContent='💰 赚了 '+customer.pay+' 元！';
    showToast('😍 顾客超满意！+'+customer.pay+'元');
  }else{
    document.getElementById('customerSpeech').textContent='😕';
    document.getElementById('customerOrder').textContent='嗯…不是我想要的…';
    document.getElementById('earnedDisplay').textContent='😕 顾客不太满意，重做一个吧';
    showToast('😕 顾客不太喜欢');
  }
  setTimeout(nextCustomer,2000);
}

document.getElementById('serveBtn').addEventListener('click',serve);
document.getElementById('clearBtn').addEventListener('click',()=>{scoops=[];toppings=[];updateIceCream();showToast('🗑️ 重做');});

// Build flavors
FLAVORS.forEach((f,i)=>{
  const btn=document.createElement('button');
  btn.className='flavor-btn s'+(i+1);
  btn.textContent=f.emoji;
  btn.title=f.name;
  btn.onclick=()=>addScoop(i);
  document.getElementById('flavorBar').appendChild(btn);
});
// Build toppings
TOPPINGS.forEach(t=>{
  const btn=document.createElement('button');
  btn.className='topping-btn';btn.textContent=t;
  btn.onclick=()=>addTopping(t);
  document.getElementById('toppingBar').appendChild(btn);
});

let toastTimer;
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),1500)}

nextCustomer();
</script>
</body>
</html>
