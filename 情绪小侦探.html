<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>🎭 情绪小侦探</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{
  font-family:-apple-system,'PingFang SC',sans-serif;
  background:linear-gradient(160deg,#EEF2FF,#E0E7FF,#C7D2FE,#DDD6FE);
  min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;align-items:center;user-select:none;
}
.header{
  width:100%;padding:14px 16px 2px;display:flex;align-items:center;justify-content:space-between;
}
.header h1{font-size:20px;font-weight:700;color:#4338CA}
.header-right{display:flex;gap:8px;align-items:center}
.header-right span{font-size:14px;font-weight:600;color:#4338CA}
.header-right button{
  background:none;border:none;font-size:18px;cursor:pointer;padding:4px;transition:transform .2s;
}
.header-right button:active{transform:scale(.82)}

/* Badges */
.badge-row{
  display:flex;gap:6px;padding:4px 14px;overflow-x:auto;scrollbar-width:none;width:100%;
}
.badge-row::-webkit-scrollbar{display:none}
.badge{
  font-size:24px;background:#fff;border-radius:10px;padding:4px 6px;border:2px solid #DDD6FE;
  transition:opacity .3s,transform .3s;flex-shrink:0;
}
.badge.locked{opacity:.3;filter:grayscale(1);transform:scale(.85)}
.badge.new{animation:badgePop .4s ease;border-color:#FBBF24}
@keyframes badgePop{0%{transform:scale(0)}50%{transform:scale(1.3)}100%{transform:scale(1)}}

/* Scene area */
.scene-area{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:8px 16px 4px;width:100%;
}
.scene-card{
  background:#fff;border-radius:28px;padding:24px 20px;width:100%;max-width:360px;
  box-shadow:0 8px 24px rgba(67,56,202,.08);border:2px solid #DDD6FE;
  text-align:center;
}
.scene-emoji{font-size:80px;margin-bottom:6px;animation:scenePop .5s ease}
@keyframes scenePop{0%{transform:scale(0) rotate(-15deg)}100%{transform:scale(1) rotate(0)}}
.scene-text{font-size:17px;font-weight:500;color:#1A1A2E;line-height:1.6;margin-bottom:16px}
.scene-hint{font-size:12px;color:#6B7280;margin-bottom:10px}

/* Emotion choices */
.emotion-grid{
  display:grid;grid-template-columns:1fr 1fr;gap:8px;
}
.emotion-btn{
  padding:12px;border-radius:16px;border:2.5px solid #DDD6FE;
  cursor:pointer;background:#fff;transition:all .15s;text-align:center;
}
.emotion-btn:active{transform:scale(.92)}
.emotion-btn .e-icon{font-size:36px}
.emotion-btn .e-label{font-size:12px;color:#4338CA;font-weight:500;margin-top:2px}
.emotion-btn.correct{background:#D1FAE5;border-color:#34D399;animation:optPop .35s ease}
.emotion-btn.wrong{background:#FEE2E2;border-color:#F87171;animation:shake .4s ease}
.emotion-btn.disabled{pointer-events:none;opacity:.6}
.emotion-btn.reveal{background:#D1FAE5;border-color:#34D399}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
@keyframes optPop{0%{transform:scale(1)}50%{transform:scale(1.08)}100%{transform:scale(1)}}

/* Feedback */
.feedback{
  margin-top:12px;font-size:16px;font-weight:600;min-height:28px;
}
.next-btn{
  margin-top:10px;padding:8px 24px;border:none;border-radius:99px;font-size:14px;font-weight:600;
  cursor:pointer;background:linear-gradient(135deg,#6366F1,#4338CA);color:#fff;
  box-shadow:0 4px 12px rgba(67,56,202,.2);transition:transform .15s;
}
.next-btn:active{transform:scale(.9)}

/* Progress */
.progress-text{font-size:12px;color:#6B7280;margin-top:6px}

#confetti-canvas{position:fixed;inset:0;z-index:300;pointer-events:none}
.toast{
  position:fixed;top:60px;left:50%;transform:translateX(-50%);background:#1A1A2E;color:#fff;
  padding:8px 20px;border-radius:99px;font-size:13px;z-index:200;
  opacity:0;transition:opacity .4s;pointer-events:none;
}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="header">
  <h1>🎭 情绪小侦探</h1>
  <div class="header-right">
    <span id="scoreDisplay">⭐ 0</span>
    <button id="resetBtn">🔄</button>
  </div>
</div>
<div class="badge-row" id="badgeRow"></div>

<div class="scene-area">
  <div class="scene-card">
    <div class="scene-emoji" id="sceneEmoji">🎂</div>
    <div class="scene-text" id="sceneText">今天是你的生日，妈妈给你准备了一个大蛋糕！</div>
    <div class="scene-hint" id="sceneHint">🤔 这时候你会是什么心情？</div>
    <div class="emotion-grid" id="emotionGrid"></div>
    <div class="feedback" id="feedback"></div>
    <button class="next-btn" id="nextBtn" style="display:none">下一题 ➜</button>
    <div class="progress-text" id="progressText">第 1 / 10 题</div>
  </div>
</div>

<canvas id="confetti-canvas"></canvas>
<div class="toast" id="toast"></div>
<script>
const SCENES = [
  {emoji:'🎂',text:'今天是你的生日，妈妈给你准备了一个大蛋糕！',correct:'😊',answer:'开心'},
  {emoji:'🦕',text:'你最心爱的玩具被小朋友弄坏了。',correct:'😢',answer:'难过'},
  {emoji:'🐶',text:'路边有一只受伤的小狗在发抖。',correct:'😢',answer:'担心'},
  {emoji:'🤝',text:'小朋友想玩你的新玩具，但你没玩够。',correct:'😊',answer:'分享也不错'},
  {emoji:'📚',text:'明天要考试了，好多字还不认识。',correct:'😰',answer:'紧张'},
  {emoji:'🍭',text:'妈妈说不刷牙会蛀牙，不给你吃糖。',correct:'😡',answer:'生气'},
  {emoji:'🏥',text:'要打预防针了，针头好大。',correct:'😨',answer:'害怕'},
  {emoji:'🌙',text:'天黑了，一个人在小房间里。',correct:'😨',answer:'害怕'},
  {emoji:'🎠',text:'周末爸爸妈妈带你去游乐园！',correct:'😊',answer:'开心'},
  {emoji:'👶',text:'妈妈抱了别的小朋友，没有抱你。',correct:'😢',answer:'委屈'},
  {emoji:'🌸',text:'你画了一幅画，老师夸你画得真棒！',correct:'😊',answer:'开心'},
  {emoji:'👻',text:'小朋友讲了一个可怕的鬼故事。',correct:'😨',answer:'害怕'},
  {emoji:'🧸',text:'好朋友要搬家去别的城市了。',correct:'😢',answer:'舍不得'},
  {emoji:'🏆',text:'你在跑步比赛中得了第一名！',correct:'😊',answer:'自豪'},
];
const EMOTIONS = [
  {icon:'😊',label:'开心'},{icon:'😢',label:'难过'},
  {icon:'😡',label:'生气'},{icon:'😨',label:'害怕'},
  {icon:'😰',label:'紧张'},{icon:'🥰',label:'感动'},
];

const BADGES = ['❤️','🌟','🦋','🌈','🫂','🎯'];
let questions = [];
let qIndex = 0;
let score = 0;
let earnedBadges = [];
let answered = false;

function shuffleArr(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}}

function startGame(){
  questions = [...SCENES];
  shuffleArr(questions);
  questions = questions.slice(0,10);
  qIndex = 0; score = 0; earnedBadges = []; answered = false;
  updateBadges();
  renderQuestion();
}

function renderQuestion(){
  if(qIndex >= questions.length){
    showComplete(); return;
  }
  answered = false;
  const q = questions[qIndex];
  document.getElementById('sceneEmoji').textContent = q.emoji;
  document.getElementById('sceneEmoji').style.animation = 'none'; void document.getElementById('sceneEmoji').offsetWidth;
  document.getElementById('sceneEmoji').style.animation = 'scenePop .5s ease';
  document.getElementById('sceneText').textContent = q.text;
  document.getElementById('sceneHint').textContent = '🤔 这时候是什么心情？';
  document.getElementById('feedback').textContent = '';
  document.getElementById('nextBtn').style.display = 'none';
  document.getElementById('progressText').textContent = `第 ${qIndex+1} / ${questions.length} 题 • ⭐ ${score}`;

  // Build choices: include correct answer + 3 random wrong ones
  let choices = [{icon:q.correct,label:EMOTIONS.find(e=>e.icon===q.correct)?.label||'?',correct:true}];
  const others = EMOTIONS.filter(e => e.icon !== q.correct);
  shuffleArr(others);
  for(let i=0; i<3 && i<others.length; i++){
    choices.push({icon:others[i].icon,label:others[i].label,correct:false});
  }
  shuffleArr(choices);

  const grid = document.getElementById('emotionGrid');
  grid.innerHTML = choices.map(c =>
    `<div class="emotion-btn" data-correct="${c.correct}" data-icon="${c.icon}">
      <div class="e-icon">${c.icon}</div>
      <div class="e-label">${c.label}</div>
    </div>`
  ).join('');

  grid.querySelectorAll('.emotion-btn').forEach(el => {
    el.addEventListener('click', () => {
      if(answered) return;
      answered = true;
      grid.querySelectorAll('.emotion-btn').forEach(b => b.classList.add('disabled'));
      const isCorrect = el.dataset.correct === 'true';
      if(isCorrect){
        el.classList.add('correct');
        try{AudioSys.correct()}catch(e){}
        score++;
        document.getElementById('feedback').textContent = `🎉 答对了！${q.answer}！`;
        document.getElementById('feedback').style.color = '#059669';
        // Check badge
        if(score > 0 && score % 2 === 0){
          const badgeIdx = Math.min(Math.floor(score/2)-1, BADGES.length-1);
          if(!earnedBadges.includes(badgeIdx)){
            earnedBadges.push(badgeIdx);
            updateBadges();
            showToast('🏅 获得徽章！');
            showConfetti(30);
          }
        }
      } else {
        el.classList.add('wrong');
        try{AudioSys.wrong()}catch(e){}
        grid.querySelectorAll('.emotion-btn').forEach(b => {
          if(b.dataset.correct === 'true') b.classList.add('reveal');
        });
        document.getElementById('feedback').textContent = `💡 再想想哦～ ${q.answer}`;
        document.getElementById('feedback').style.color = '#DC2626';
      }
      document.getElementById('nextBtn').style.display = 'inline-block';
    });
  });
}

function nextQuestion(){
  qIndex++;
  document.getElementById('nextBtn').style.display = 'none';
  renderQuestion();
}

function showComplete(){
  const allBadges = earnedBadges.length >= BADGES.length;
  document.getElementById('sceneEmoji').textContent = allBadges ? '🏆' : '🌟';
  document.getElementById('sceneText').textContent = `太棒了！你答对了 ${score}/${questions.length} 题！`;
  document.getElementById('sceneHint').textContent = '你是真正的情绪小侦探！🎉';
  document.getElementById('emotionGrid').innerHTML = '';
  document.getElementById('feedback').textContent = allBadges ? '🎉🎉 全部徽章集齐！' : '继续加油，收集更多徽章吧！';
  document.getElementById('feedback').style.color = '#4338CA';
  document.getElementById('nextBtn').style.display = 'none';
  document.getElementById('progressText').textContent = `🎊 完成！⭐ ${score}`;
  showConfetti(60);
}

function updateBadges(){
  const row = document.getElementById('badgeRow');
  row.innerHTML = BADGES.map((b,i) => {
    const has = earnedBadges.includes(i);
    return `<span class="badge${has?' new':' locked'}">${has?b:'🔒'}</span>`;
  }).join('');
  document.getElementById('scoreDisplay').textContent = `⭐ ${score}`;
}

document.getElementById('nextBtn').addEventListener('click', nextQuestion);
document.getElementById('resetBtn').addEventListener('click', () => {
  if(confirm('重新开始？')) startGame();
});

function showConfetti(n){
  const c=document.getElementById('confetti-canvas');
  c.width=window.innerWidth; c.height=window.innerHeight;
  const ctx=c.getContext('2d');
  const colors=['#6366F1','#4338CA','#EC4899','#F59E0B','#34D399','#3B82F6'];
  const ps=[];
  for(let i=0;i<(n||50);i++)ps.push({x:Math.random()*c.width,y:-Math.random()*c.height,w:4+Math.random()*6,h:3+Math.random()*5,color:colors[Math.floor(Math.random()*colors.length)],vy:2+Math.random()*3,vx:-1+Math.random()*2,rot:Math.random()*360,rv:-4+Math.random()*8,alpha:1});
  let frame=0;
  function draw(){
    ctx.clearRect(0,0,c.width,c.height);let alive=false;
    for(const p of ps){p.x+=p.vx;p.y+=p.vy;p.rot+=p.rv;p.alpha-=0.004;if(p.alpha<=0)continue;alive=true;ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot*Math.PI/180);ctx.globalAlpha=p.alpha;ctx.fillStyle=p.color;ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);ctx.restore()}
    if(alive&&frame++<200)requestAnimationFrame(draw);else{ctx.clearRect(0,0,c.width,c.height);c.width=0;c.height=0}
  }draw();
}

let toastTimer;
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),1500)}

startGame();
// AudioSys
const AudioSys={correct:function(){try{var c=new(window.AudioContext||window.webkitAudioContext)();[523,659,784].forEach(function(f,i){setTimeout(function(){var o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type='sine';o.frequency.setValueAtTime(f,c.currentTime);g.gain.setValueAtTime(.2,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.2);o.start();o.stop(c.currentTime+.2)},i*90)})}catch(e){}},wrong:function(){try{var c=new(window.AudioContext||window.webkitAudioContext)(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type='square';o.frequency.setValueAtTime(300,c.currentTime);g.gain.setValueAtTime(.1,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.4);o.start();o.stop(c.currentTime+.4)}catch(e){}}};
</script>
</body>
</html>
