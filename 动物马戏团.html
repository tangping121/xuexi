<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>🎪 动物马戏团</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{
  font-family:-apple-system,'PingFang SC',sans-serif;
  background:linear-gradient(160deg,#FEF3C7,#FDE68A,#FBBF24);
  min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;align-items:center;user-select:none;
  overflow:hidden;
}
.header{
  width:100%;padding:12px 16px 4px;display:flex;align-items:center;justify-content:space-between;
  position:relative;z-index:2;
}
.header h1{font-size:20px;font-weight:700;color:#92400E}
.header-right{display:flex;gap:8px;align-items:center}
.header-right span{font-size:14px;font-weight:600;color:#D97706}
.header-right button{
  background:none;border:none;font-size:18px;cursor:pointer;padding:4px;transition:transform .2s;
}
.header-right button:active{transform:scale(.82)}

/* Stage */
.stage{
  flex:1;width:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;
  position:relative;overflow:hidden;
}
.stage-bg{
  position:absolute;inset:0;pointer-events:none;
  background:radial-gradient(ellipse at center,rgba(251,191,36,.2) 0%,transparent 70%);
}
.curtain-l,.curtain-r{
  position:absolute;top:0;width:30px;height:100%;
  background:linear-gradient(180deg,#DC2626,#991B1B,#DC2626);
  z-index:1;
}
.curtain-l{left:0;border-radius:0 20px 20px 0}
.curtain-r{right:0;border-radius:20px 0 0 20px}
.star-lights{
  position:absolute;top:0;left:0;right:0;height:20px;
  display:flex;gap:10px;justify-content:center;padding:2px 40px;z-index:1;
}
.star-lights span{font-size:12px;animation:twinkle .8s ease infinite alternate}
.star-lights span:nth-child(odd){animation-delay:.4s}
@keyframes twinkle{0%{opacity:.3;transform:scale(.8)}100%{opacity:1;transform:scale(1.2)}}

/* Animal */
.animal-display{
  font-size:120px;position:relative;z-index:2;
  transition:transform .1s;cursor:pointer;
}
.animal-display:active{transform:scale(.9)!important}
.animal-display.perform{
  animation:performAnim .6s ease;
}
@keyframes performAnim{
  0%{transform:translateY(0) rotate(0deg)}
  20%{transform:translateY(-30px) rotate(-5deg)}
  40%{transform:translateY(-60px) rotate(5deg)}
  60%{transform:translateY(-30px) rotate(-3deg)}
  80%{transform:translateY(-15px) rotate(2deg)}
  100%{transform:translateY(0) rotate(0deg)}
}
.animal-display.jump{animation:jumpAnim .5s ease}
@keyframes jumpAnim{0%{transform:translateY(0) scale(1)}30%{transform:translateY(-80px) scale(1.1)}60%{transform:translateY(-80px) scale(1.1)}100%{transform:translateY(0) scale(1)}}
.animal-display.spin{animation:spinAnim .6s ease}
@keyframes spinAnim{0%{transform:rotate(0deg) scale(1)}100%{transform:rotate(360deg) scale(1)}}
.animal-display.bow{animation:bowAnim .5s ease}
@keyframes bowAnim{0%{transform:rotate(0deg)}30%{transform:rotate(25deg)}100%{transform:rotate(0deg)}}

/* Props */
.props{
  display:flex;gap:20px;margin:8px 0;font-size:30px;z-index:2;
}
.props span{transition:transform .3s}
.props span.use{animation:propAnim .5s ease}
@keyframes propAnim{0%{transform:scale(1) rotate(0)}50%{transform:scale(1.3) rotate(45deg)}100%{transform:scale(1) rotate(0)}}

/* Performer selector */
.selector{
  display:flex;gap:8px;padding:6px 14px 0;overflow-x:auto;scrollbar-width:none;width:100%;z-index:2;
}
.selector::-webkit-scrollbar{display:none}
.selector-btn{
  width:52px;height:52px;border-radius:14px;border:2.5px solid #FDE68A;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:26px;background:#fff;transition:all .15s;flex-shrink:0;
}
.selector-btn:active{transform:scale(.88)}
.selector-btn.active{border-color:#D97706;background:#FFFBEB;box-shadow:0 0 0 2px #FDE68A}

/* Perform button */
.perform-bar{
  padding:6px 14px 16px;display:flex;gap:8px;z-index:2;
}
.perform-btn{
  padding:10px 24px;border-radius:99px;border:none;font-size:14px;font-weight:600;
  cursor:pointer;transition:transform .15s;
}
.perform-btn:active{transform:scale(.9)}
.perform-btn.do{background:linear-gradient(135deg,#DC2626,#991B1B);color:#fff;box-shadow:0 4px 12px rgba(153,27,27,.2)}
.perform-btn.laugh{background:#FFFBEB;color:#92400E;border:2px solid #FDE68A}

/* Cheers popup */
.cheers{
  position:absolute;font-size:40px;animation:cheerUp 1.2s ease forwards;pointer-events:none;z-index:3;
}
@keyframes cheerUp{0%{transform:translateY(0) scale(0);opacity:1}50%{transform:translateY(-40px) scale(1.2);opacity:1}100%{transform:translateY(-100px) scale(.8);opacity:0}}

.toast{
  position:fixed;top:60px;left:50%;transform:translateX(-50%);background:#1A1A2E;color:#fff;
  padding:8px 20px;border-radius:99px;font-size:13px;z-index:200;
  opacity:0;transition:opacity .4s;pointer-events:none;
}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="header">
  <h1>🎪 动物马戏团</h1>
  <div class="header-right">
    <span id="clapDisplay">👏 0</span>
    <button id="resetBtn">🔄</button>
  </div>
</div>

<div class="stage">
  <div class="star-lights" id="starLights"></div>
  <div class="curtain-l"></div><div class="curtain-r"></div>
  <div class="stage-bg"></div>
  <div class="animal-display" id="animalDisplay">🐻</div>
  <div class="props" id="propsArea"></div>
  <div class="cheers" id="cheersArea"></div>
</div>

<div class="selector" id="selector"></div>
<div class="perform-bar">
  <button class="perform-btn do" id="performBtn">🎪 表演！</button>
  <button class="perform-btn laugh" id="laughBtn">😂 逗它笑</button>
</div>

<div class="toast" id="toast"></div>
<script>
const ANIMALS = [
  {emoji:'🐻',name:'小熊',acts:['perform','jump','spin','bow'],props:'🎈'},
  {emoji:'🦁',name:'小狮',acts:['perform','jump','spin'],props:'🔥'},
  {emoji:'🐒',name:'小猴',acts:['jump','spin','bow'],props:'🍌'},
  {emoji:'🐘',name:'小象',acts:['perform','bow','spin'],props:'🌊'},
  {emoji:'🦭',name:'海狮',acts:['perform','jump','bow'],props:'⚽'},
  {emoji:'🐬',name:'海豚',acts:['jump','spin','perform'],props:'🌈'},
  {emoji:'🐧',name:'企鹅',acts:['bow','spin','jump'],props:'❄️'},
  {emoji:'🦊',name:'小狐',acts:['jump','spin','perform'],props:'🪶'},
];
const ACT_LABELS = {perform:'🌟 跳跳',jump:'🚀 飞飞',spin:'🌀 转转',bow:'🙇 鞠躬'};

let currentAnimal = 0;
let claps = 0;
let animating = false;

function buildSelector(){
  const bar=document.getElementById('selector');
  ANIMALS.forEach((a,i)=>{
    const btn=document.createElement('button');
    btn.className='selector-btn'+(i===currentAnimal?' active':'');
    btn.textContent=a.emoji;
    btn.title=a.name;
    btn.onclick=()=>{
      currentAnimal=i;
      document.querySelectorAll('.selector-btn').forEach((b,j)=>b.classList.toggle('active',j===i));
      updateAnimal();
    };
    bar.appendChild(btn);
  });
}

function updateAnimal(){
  const a=ANIMALS[currentAnimal];
  const d=document.getElementById('animalDisplay');
  d.textContent=a.emoji;
  d.className='animal-display';
  document.getElementById('propsArea').innerHTML=`<span>${a.props}</span>`;
  document.getElementById('clapDisplay').textContent='👏 '+claps;
}

function perform(){
  if(animating)return;
  animating=true;
  const a=ANIMALS[currentAnimal];
  const acts=a.acts;
  const idx=Math.floor(Math.random()*acts.length);
  const act=acts[idx];
  const d=document.getElementById('animalDisplay');
  d.className='animal-display '+act;
  // Cheers
  showCheers();
  // Claps
  claps++;
  document.getElementById('clapDisplay').textContent='👏 '+claps;
  // Props animation
  const propsEl=document.querySelector('#propsArea span');
  if(propsEl){propsEl.classList.remove('use');void propsEl.offsetWidth;propsEl.classList.add('use')}
  showToast(a.name+'表演了'+ACT_LABELS[act]+'！👏');
  setTimeout(()=>{animating=false},800);
}

function showCheers(){
  const area=document.getElementById('cheersArea');
  const cheers=['👏','🎉','🌟','😍','💖','🥳'];
  for(let i=0;i<5;i++){
    setTimeout(()=>{
      const el=document.createElement('div');
      el.className='cheers';
      el.textContent=cheers[Math.floor(Math.random()*cheers.length)];
      el.style.left=(20+Math.random()*60)+'%';
      el.style.bottom='60px';
      area.appendChild(el);
      setTimeout(()=>el.remove(),1500);
    },i*150);
  }
}

function laughAct(){
  if(animating)return;
  animating=true;
  const d=document.getElementById('animalDisplay');
  d.className='animal-display';
  // Ticklish effect
  d.style.transform='scale(1.1)';
  setTimeout(()=>{d.style.transform='scale(.9)'},100);
  setTimeout(()=>{d.style.transform='scale(1.05)'},200);
  setTimeout(()=>{d.style.transform='scale(.95)'},300);
  setTimeout(()=>{d.style.transform='scale(1)'},400);
  claps+=2;
  document.getElementById('clapDisplay').textContent='👏 '+claps;
  document.getElementById('propsArea').innerHTML='<span>😂</span>';
  setTimeout(()=>updateAnimal(),600);
  showToast('😂 逗得'+ANIMALS[currentAnimal].name+'哈哈大笑！');
  setTimeout(()=>{animating=false},500);
}

document.getElementById('performBtn').addEventListener('click',perform);
document.getElementById('laughBtn').addEventListener('click',laughAct);
document.getElementById('resetBtn').addEventListener('click',()=>{
  claps=0;currentAnimal=0;
  document.querySelectorAll('.selector-btn').forEach((b,i)=>b.classList.toggle('active',i===0));
  updateAnimal();
  showToast('🔄 重新开场！');
});

// Build star lights
for(let i=0;i<12;i++){
  const s=document.createElement('span');
  s.textContent='⭐';
  document.getElementById('starLights').appendChild(s);
}

let toastTimer;
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),1200)}

buildSelector();
updateAnimal();
</script>
</body>
</html>
