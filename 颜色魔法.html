<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>🌈 颜色魔法</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{
  font-family:-apple-system,'PingFang SC',sans-serif;
  background:linear-gradient(160deg,#FDF2F8,#F3E8FF,#EEF2FF);
  min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;user-select:none;
}
.header{
  padding:14px 16px 4px;display:flex;align-items:center;justify-content:space-between;
}
.header h1{font-size:20px;font-weight:700;
  background:linear-gradient(90deg,#EC4899,#F59E0B,#34D399,#3B82F6,#8B5CF6);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.header-right{display:flex;gap:8px}
.header-right button{
  background:none;border:none;font-size:18px;cursor:pointer;padding:4px;transition:transform .2s;
}
.header-right button:active{transform:scale(.82)}

/* Mode bar */
.mode-bar{display:flex;gap:6px;justify-content:center;padding:2px 0}
.mode-btn{
  padding:5px 16px;border-radius:99px;border:2px solid #DDD6FE;font-size:12px;font-weight:500;
  cursor:pointer;background:#fff;color:#6D28D9;transition:all .15s;
}
.mode-btn:active{transform:scale(.9)}
.mode-btn.active{background:#7C3AED;color:#fff;border-color:#7C3AED}

/* Mix area (mode 1) */
.mix-area{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 16px;
}
.mix-box{
  display:flex;gap:16px;align-items:center;margin-bottom:10px;
}
.paint-bucket{
  width:80px;height:80px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:700;color:#fff;box-shadow:0 4px 12px rgba(0,0,0,.1);
  transition:transform .3s;cursor:pointer;position:relative;
}
.paint-bucket:active{transform:scale(.88)}
.paint-bucket .label{position:absolute;bottom:-18px;font-size:10px;color:#6B7280;white-space:nowrap}
.paint-bucket.red{background:#EF4444}.paint-bucket.blue{background:#3B82F6}.paint-bucket.yellow{background:#F59E0B}
.paint-bucket.result{width:100px;height:100px;font-size:16px}
.paint-bucket.selected{transform:scale(1.1);box-shadow:0 0 0 4px #C084FC}
.mix-sign{font-size:28px;color:#7C3AED;font-weight:700}

/* Palette (mode 2) */
.palette-area{
  display:none;flex:1;flex-direction:column;padding:8px 16px;
}
.palette-area.show{display:flex}
.canvas-wrap{
  flex:1;border-radius:20px;overflow:hidden;background:#fff;box-shadow:0 4px 16px rgba(124,58,237,.06);
  margin-bottom:6px;position:relative;
}
#paletteCanvas{width:100%;height:100%;display:block;touch-action:none;cursor:crosshair}
.color-bar{
  display:flex;gap:6px;padding:4px 0;flex-wrap:wrap;justify-content:center;
}
.color-dot{
  width:36px;height:36px;border-radius:50%;border:3px solid transparent;cursor:pointer;transition:all .15s;
}
.color-dot:active{transform:scale(.85)}
.color-dot.active{border-color:#1A1A2E;transform:scale(1.15)}
.size-bar{display:flex;gap:6px;justify-content:center;padding:2px 0}
.size-dot-btn{
  width:28px;height:28px;border-radius:50%;border:2px solid #DDD6FE;cursor:pointer;
  display:flex;align-items:center;justify-content:center;background:#fff;transition:all .15s;
}
.size-dot-btn:active{transform:scale(.85)}
.size-dot-btn.active{border-color:#7C3AED;background:#FAF5FF}

/* Color quiz (mode 3 hidden inside mode 1) */
.quiz-mini{display:none;width:100%;max-width:320px;margin-top:6px}
.quiz-mini.show{display:block}
.quiz-mini .q{font-size:15px;font-weight:500;color:#1A1A2E;text-align:center;margin-bottom:6px}
.quiz-mini .opts{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.quiz-mini .opt{
  padding:10px;border-radius:12px;border:2.5px solid #DDD6FE;font-size:14px;font-weight:500;
  cursor:pointer;background:#fff;color:#6D28D9;text-align:center;transition:all .15s;
}
.quiz-mini .opt:active{transform:scale(.92)}
.quiz-mini .opt.correct{background:#D1FAE5;border-color:#34D399;color:#065F46}
.quiz-mini .opt.wrong{background:#FEE2E2;border-color:#F87171;color:#991B1B}
.quiz-mini .fb{text-align:center;font-size:14px;margin:4px 0;min-height:22px}

.toast{
  position:fixed;top:60px;left:50%;transform:translateX(-50%);background:#1A1A2E;color:#fff;
  padding:8px 20px;border-radius:99px;font-size:13px;z-index:200;
  opacity:0;transition:opacity .4s;pointer-events:none;
}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="header">
  <h1>🌈 颜色魔法</h1>
  <div class="header-right">
    <span id="colorLabel" style="font-size:14px;font-weight:600;color:#7C3AED">🎨 调色盘</span>
  </div>
</div>

<div class="mode-bar">
  <button class="mode-btn active" id="mixModeBtn">🔬 颜色混合</button>
  <button class="mode-btn" id="paintModeBtn">🎨 自由涂色</button>
  <button class="mode-btn" id="quizModeBtn">✏️ 颜色问答</button>
</div>

<div class="mix-area" id="mixArea">
  <div class="mix-box">
    <div class="paint-bucket red" id="bucketA" data-color="red">🔴<span class="label">红</span></div>
    <span class="mix-sign">+</span>
    <div class="paint-bucket yellow" id="bucketB" data-color="yellow">🟡<span class="label">黄</span></div>
    <span class="mix-sign">=</span>
    <div class="paint-bucket result" id="resultBucket" style="background:#ddd">?<span class="label">混合结果</span></div>
  </div>
  <div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:8px">
    <div class="paint-bucket red" style="width:50px;height:50px;font-size:10px" onclick="pickColor('red')">🔴</div>
    <div class="paint-bucket yellow" style="width:50px;height:50px;font-size:10px" onclick="pickColor('yellow')">🟡</div>
    <div class="paint-bucket blue" style="width:50px;height:50px;font-size:10px" onclick="pickColor('blue')">🔵</div>
  </div>
  <div style="margin-top:6px;text-align:center;font-size:12px;color:#6B7280">💡 点上方颜色桶选择，再点下面的颜色来混合</div>

  <div class="quiz-mini" id="colorQuiz">
    <div class="q" id="quizQ">❓ 红色 + 蓝色 = ？</div>
    <div class="opts" id="quizOpts"></div>
    <div class="fb" id="quizFb"></div>
  </div>
</div>

<div class="palette-area" id="paletteArea">
  <div class="canvas-wrap">
    <canvas id="paletteCanvas"></canvas>
  </div>
  <div class="color-bar" id="colorBar"></div>
  <div class="size-bar" id="sizeBar"></div>
</div>

<div class="toast" id="toast"></div>
<script>
const COLORS=[
  {name:'红色',hex:'#EF4444'},{name:'橙色',hex:'#F97316'},{name:'黄色',hex:'#F59E0B'},
  {name:'绿色',hex:'#22C55E'},{name:'青色',hex:'#14B8A6'},{name:'蓝色',hex:'#3B82F6'},
  {name:'紫色',hex:'#A855F7'},{name:'粉色',hex:'#EC4899'},{name:'棕色',hex:'#92400E'},
  {name:'黑色',hex:'#1F2937'},{name:'灰色',hex:'#9CA3AF'},{name:'白色',hex:'#FFFFFF'},
];
const MIX_RECIPES=[
  {a:'red',b:'yellow',result:'orange',name:'橙色',hex:'#F97316'},
  {a:'red',b:'blue',result:'purple',name:'紫色',hex:'#A855F7'},
  {a:'yellow',b:'blue',result:'green',name:'绿色',hex:'#22C55E'},
  {a:'red',b:'green',result:'brown',name:'棕色',hex:'#92400E'},
  {a:'blue',b:'yellow',result:'green',name:'绿色',hex:'#22C55E'},
];
let selectedA='red',selectedB='yellow';
let quizAnswered=false;

// ── Mix mode ──
function pickColor(name){
  if(!selectedA||selectedA===selectedB){selectedA=name;document.querySelectorAll('#bucketA,#bucketB').forEach(b=>b.classList.remove('selected'));document.getElementById('bucketA').classList.add('selected');return}
  if(!selectedB){selectedB=name;document.getElementById('bucketB').classList.add('selected');mixColors()}
}
function mixColors(){
  const recipe=MIX_RECIPES.find(r=>(r.a===selectedA&&r.b===selectedB)||(r.a===selectedB&&r.b===selectedA));
  const bucket=document.getElementById('resultBucket');
  if(recipe){
    bucket.style.background=recipe.hex;
    bucket.textContent='🎨';bucket.style.fontSize='20px';
    showToast('🎉 '+selectedA+' + '+selectedB+' = '+recipe.name);
    // Sound
    try{var c=new(window.AudioContext||window.webkitAudioContext)();[660,880].forEach(function(f,i){setTimeout(function(){var o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type='sine';o.frequency.setValueAtTime(f,c.currentTime);g.gain.setValueAtTime(.12,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.15);o.start();o.stop(c.currentTime+.15)},i*100)})}catch(e){}
  }else{
    bucket.style.background='#bbb';bucket.textContent='❓';bucket.style.fontSize='20px';
    showToast('🤔 这样混合不出新颜色，再试试');
  }
  setTimeout(()=>{selectedA='red';selectedB='yellow';document.querySelectorAll('.paint-bucket').forEach(b=>b.classList.remove('selected'));document.getElementById('bucketA').classList.add('selected')},500);
}

// ── Paint mode ──
const pCanvas=document.getElementById('paletteCanvas');
const pCtx=pCanvas.getContext('2d');
let pColor='#EF4444',pSize=6,pDrawing=false;

function resizePalette(){
  const wrap=pCanvas.parentElement;
  pCanvas.width=wrap.clientWidth*window.devicePixelRatio;
  pCanvas.height=wrap.clientHeight*window.devicePixelRatio;
  pCtx.scale(window.devicePixelRatio,window.devicePixelRatio);
  pCanvas.style.width=wrap.clientWidth+'px';
  pCanvas.style.height=wrap.clientHeight+'px';
  pCtx.lineCap='round';pCtx.lineJoin='round';
}
function pStart(e){e.preventDefault();pDrawing=true;const p=getP(e);pCtx.beginPath();pCtx.moveTo(p.x,p.y);pCtx.strokeStyle=pColor;pCtx.lineWidth=pSize;if(pColor==='#FFFFFF')pCtx.strokeStyle='#E5E7EB'}
function pMove(e){if(!pDrawing)return;e.preventDefault();const p=getP(e);pCtx.lineTo(p.x,p.y);pCtx.stroke();pCtx.strokeStyle=pColor;pCtx.lineWidth=pSize;if(pColor==='#FFFFFF')pCtx.strokeStyle='#E5E7EB'}
function pStop(){pDrawing=false}
function getP(e){const r=pCanvas.getBoundingClientRect();const t=e.touches?e.touches[0]:e;return{x:t.clientX-r.left,y:t.clientY-r.top}}
pCanvas.addEventListener('mousedown',pStart);pCanvas.addEventListener('mousemove',pMove);pCanvas.addEventListener('mouseup',pStop);pCanvas.addEventListener('mouseleave',pStop);
pCanvas.addEventListener('touchstart',pStart,{passive:false});pCanvas.addEventListener('touchmove',pMove,{passive:false});pCanvas.addEventListener('touchend',pStop,{passive:false});

function buildPalette(){
  const bar=document.getElementById('colorBar');
  COLORS.forEach(c=>{
    const btn=document.createElement('div');
    btn.className='color-dot'+(c.hex==='#EF4444'?' active':'');
    btn.style.background=c.hex;if(c.hex==='#FFFFFF')btn.style.border='3px solid #DDD6FE';
    btn.onclick=()=>{pColor=c.hex;bar.querySelectorAll('.color-dot').forEach(b=>b.classList.remove('active'));btn.classList.add('active')};
    bar.appendChild(btn);
  });
  const sb=document.getElementById('sizeBar');
  [3,6,10,16].forEach(s=>{
    const btn=document.createElement('div');
    btn.className='size-dot-btn'+(s===6?' active':'');
    btn.innerHTML='<div style="width:'+(s*1.2)+'px;height:'+(s*1.2)+'px;border-radius:50%;background:#7C3AED"></div>';
    btn.onclick=()=>{pSize=s;sb.querySelectorAll('.size-dot-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active')};
    sb.appendChild(btn);
  });
  // Clear button
  const clr=document.createElement('div');
  clr.className='size-dot-btn';clr.style.fontSize='12px';clr.innerHTML='🗑️';
  clr.onclick=()=>{resizePalette();showToast('🗑️ 已清空')};
  sb.appendChild(clr);
}

// ── Quiz mode ──
const QUIZ=[
  {q:'🔴 红色 + 🟡 黄色 = ?',a:'橙色'},
  {q:'🔴 红色 + 🔵 蓝色 = ?',a:'紫色'},
  {q:'🟡 黄色 + 🔵 蓝色 = ?',a:'绿色'},
  {q:'🔴 红色 + 🟢 绿色 = ?',a:'棕色'},
];
let qi=0;

function startQuiz(){
  document.getElementById('colorQuiz').classList.add('show');
  qi=0;quizAnswered=false;showQuiz();
}
function showQuiz(){
  const q=QUIZ[qi];
  document.getElementById('quizQ').textContent=q.q;
  document.getElementById('quizFb').textContent='';
  const answers=['红色','橙色','黄色','绿色','青色','蓝色','紫色','粉色','棕色','灰色'];
  let opts=[q.a];
  const pool=answers.filter(a=>a!==q.a);
  for(let i=pool.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[pool[i],pool[j]]=[pool[j],pool[i]]}
  while(opts.length<4)opts.push(pool.pop());
  for(let i=opts.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[opts[i],opts[j]]=[opts[j],opts[i]]}
  const grid=document.getElementById('quizOpts');
  grid.innerHTML=opts.map(o=>`<div class="opt" data-a="${o}">${o}</div>`).join('');
  quizAnswered=false;
  grid.querySelectorAll('.opt').forEach(el=>{
    el.addEventListener('click',()=>{
      if(quizAnswered)return;
      quizAnswered=true;
      grid.querySelectorAll('.opt').forEach(b=>b.style.pointerEvents='none');
      const correct=el.dataset.a===q.a;
      if(correct){el.classList.add('correct');document.getElementById('quizFb').textContent='🎉 对的！';document.getElementById('quizFb').style.color='#059669'}
      else{el.classList.add('wrong');grid.querySelectorAll('.opt').forEach(b=>{if(b.dataset.a===q.a)b.classList.add('correct')});document.getElementById('quizFb').textContent='❌ 答案是 '+q.a;document.getElementById('quizFb').style.color='#DC2626'}
      setTimeout(()=>{qi=(qi+1)%QUIZ.length;showQuiz()},1500);
    });
  });
}

// ── UI Modes ──
document.getElementById('mixModeBtn').addEventListener('click',()=>{
  document.getElementById('mixModeBtn').classList.add('active');
  document.getElementById('paintModeBtn').classList.remove('active');
  document.getElementById('quizModeBtn').classList.remove('active');
  document.getElementById('mixArea').style.display='flex';
  document.getElementById('paletteArea').classList.remove('show');
  document.getElementById('colorQuiz').classList.remove('show');
});
document.getElementById('paintModeBtn').addEventListener('click',()=>{
  document.getElementById('paintModeBtn').classList.add('active');
  document.getElementById('mixModeBtn').classList.remove('active');
  document.getElementById('quizModeBtn').classList.remove('active');
  document.getElementById('mixArea').style.display='none';
  document.getElementById('paletteArea').classList.add('show');
  document.getElementById('colorQuiz').classList.remove('show');
  setTimeout(resizePalette,50);
});
document.getElementById('quizModeBtn').addEventListener('click',()=>{
  document.getElementById('quizModeBtn').classList.add('active');
  document.getElementById('mixModeBtn').classList.remove('active');
  document.getElementById('paintModeBtn').classList.remove('active');
  document.getElementById('mixArea').style.display='flex';
  document.getElementById('paletteArea').classList.remove('show');
  startQuiz();
});

let toastTimer;
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),1500)}

buildPalette();
</script>
</body>
</html>
